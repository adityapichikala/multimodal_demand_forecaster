name: PR Checks – Lint, Format & Test

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Format (black + flake8)
  # ─────────────────────────────────────────────
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8

      - name: Check formatting with Black
        run: black --check .

      - name: Lint with Flake8
        run: flake8 .

  # ─────────────────────────────────────────────
  # Job 2: test (root-level pytest)
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint-and-format

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest (e2e tests skipped in CI)
        env:
          CI: "true"
        run: pytest test_e2e.py --tb=short -v

  # ─────────────────────────────────────────────
  # Job 3: backend-test (mirrors test, explicit)
  # ─────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    needs: lint-and-format

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run backend pytest suite (e2e tests skipped in CI)
        env:
          CI: "true"
        run: pytest test_e2e.py --tb=short -v
