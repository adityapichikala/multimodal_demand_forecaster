name: PR Checks – Lint, Format & Test

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Format (black + flake8)
  # ─────────────────────────────────────────────
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8

      - name: Check formatting with Black
        run: black --check .

      - name: Lint with Flake8
        run: flake8 .

  # ─────────────────────────────────────────────
  # Job 2: test (root-level pytest)
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint-and-format

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx uvicorn

      - name: Create database tables
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db
        run: python -c "import models; from database import Base, engine; Base.metadata.create_all(engine)"

      - name: Start FastAPI server
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          GEMINI_API_KEY: ci_dummy
          OPENROUTER_API_KEY: ci_dummy
          WEATHERAPI_KEY: ci_dummy
          NEWSAPI_AI_KEY: ci_dummy
          CI: "true"
        run: |
          uvicorn api:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && echo "Server ready" && break || sleep 1
          done

      - name: Run pytest
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          CI: "true"
        run: pytest test_e2e.py --tb=short -v

  # ─────────────────────────────────────────────
  # Job 3: backend-test (mirrors test, explicit)
  # ─────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    needs: lint-and-format

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx uvicorn

      - name: Create database tables
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db
        run: python -c "import models; from database import Base, engine; Base.metadata.create_all(engine)"

      - name: Start FastAPI server
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          GEMINI_API_KEY: ci_dummy
          OPENROUTER_API_KEY: ci_dummy
          WEATHERAPI_KEY: ci_dummy
          NEWSAPI_AI_KEY: ci_dummy
          CI: "true"
        run: |
          uvicorn api:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && echo "Server ready" && break || sleep 1
          done

      - name: Run backend pytest suite
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          CI: "true"
        run: pytest test_e2e.py --tb=short -v
