name: Enterprise Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx uvicorn
    - name: Create database tables
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db
      run: python -c "import models; from database import Base, engine; Base.metadata.create_all(engine)"
    - name: Start FastAPI server
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
        GEMINI_API_KEY: ci_dummy
        OPENROUTER_API_KEY: ci_dummy
        WEATHERAPI_KEY: ci_dummy
        NEWSAPI_AI_KEY: ci_dummy
        CI: "true"
      run: |
        uvicorn api:app --host 0.0.0.0 --port 8000 &
        for i in $(seq 1 30); do
          curl -sf http://localhost:8000/health && echo "Server ready" && break || sleep 1
        done
    - name: Run Pytest
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
        CI: "true"
      run: |
        pytest test_e2e.py -v

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm install
    - name: Run Linter
      run: npx eslint src/
